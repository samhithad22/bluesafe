<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BlueSafe Marine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .hero-login {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-blue), var(--success-green));
            position: relative;
            overflow: hidden;
        }
        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDBweCIgdmlld0JveD0iMCAwIDEyMDAgMTAwIiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxwYXRoIGQ9Ik0wIDEwMFY2MEwxMjAwIDBDMTIwMCAwIDEyMDAgMTAwIDAgMTAwWiIgZmlsbD0id2hpdGUiLz48L3N2Zz4=');
            background-size: cover;
            animation: wave 10s linear infinite;
        }
        @keyframes wave {
            0% { transform: translateX(0) translateZ(0) scaleY(1); }
            50% { transform: translateX(-25%) translateZ(0) scaleY(0.55); }
            100% { transform: translateX(-50%) translateZ(0) scaleY(1); }
        }
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: float 6s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        .auth-container {
            position: relative;
            z-index: 2;
            max-width: 500px;
            margin: 0 auto;
        }
        .auth-tabs {
            display: flex;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 4px;
            margin-bottom: 2rem;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .tab-btn.active {
            background: white;
            color: var(--primary-blue);
        }
        .form-container {
            display: none;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .form-container.active {
            display: block;
            animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .demo-users {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .demo-user {
            background: var(--light-bg);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .demo-user:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: var(--primary-blue);
        }
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #555;
        }
        @media (max-width: 768px) {
            .form-container { padding: 2rem 1.5rem; margin: 1rem; }
            .auth-tabs { margin-bottom: 1rem; }
        }
    </style>
</head>
<body class="hero-login">
    <div class="particles" id="particles"></div>
    <div class="wave"></div>
    
    <main class="auth-container">
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <button class="tab-btn" onclick="switchTab('signup')">
                <i class="fas fa-user-plus"></i> Sign Up
            </button>
        </div>

        <!-- Login Form -->
        <div id="loginFormContainer" class="form-container active">
            <h2><i class="fas fa-water"></i> Welcome Back</h2>
            <p style="color: #666; margin-bottom: 2rem;">Access marine protection dashboard</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="volunteer@bluesafe.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> Role</label>
                    <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                        <label style="flex:1; background: var(--light-bg); padding: 1rem; border-radius: 12px; cursor: pointer; transition: all 0.3s;">
                            <input type="radio" name="loginRole" value="volunteer" style="display: none;" required>
                            <i class="fas fa-users" style="color: var(--success-green); font-size: 1.5rem;"></i>
                            <div>Volunteer</div>
                        </label>
                        <label style="flex:1; background: var(--light-bg); padding: 1rem; border-radius: 12px; cursor: pointer; transition: all 0.3s;">
                            <input type="radio" name="loginRole" value="authority" style="display: none;">
                            <i class="fas fa-shield-alt" style="color: var(--primary-blue); font-size: 1.5rem;"></i>
                            <div>Authority</div>
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 16px;">
                    <i class="fas fa-sign-in-alt"></i> Enter Dashboard
                </button>
            </form>

            <div class="demo-users">
                <h4 style="grid-column: 1/-1; text-align: center; margin: 1.5rem 0 0.5rem 0; color: #666;">Quick Demo Login</h4>
                <div class="demo-user" onclick="quickLogin('volunteer@test.com', '123', 'volunteer')">
                    <i class="fas fa-users"></i>
                    <div>Volunteer</div>
                    <div>volunteer@test.com / 123</div>
                </div>
                <div class="demo-user" onclick="quickLogin('admin@test.com', '123', 'authority')">
                    <i class="fas fa-shield-alt"></i>
                    <div>Authority</div>
                    <div>admin@test.com / 123</div>
                </div>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signupFormContainer" class="form-container">
            <h2><i class="fas fa-user-plus"></i> Join the Mission</h2>
            <p style="color: #666; margin-bottom: 2rem;">Create account to help clean the Water</p>
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupName"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="signupEmail"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="signupEmail" placeholder="john@ocean.org" required>
                </div>
                <div class="form-group">
                    <label for="signupPassword"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="signupPassword" placeholder="Create password" required>
                </div>
                <button type="submit" class="btn btn-success" style="width: 100%; font-size: 1.1rem; padding: 16px;">
                    <i class="fas fa-user-plus"></i> Sign Up
                </button>
            </form>
            <p style="text-align: center; margin-top: 1rem; color: #666;">Already have account? <button onclick="switchTab('login')" class="btn btn-link">Login</button></p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Enhanced login with creativity
        let currentTab = 'login';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-btn')[tab === 'login' ? 0 : 1].classList.add('active');
            document.querySelectorAll('.form-container').forEach(form => form.classList.remove('active'));
            document.getElementById(tab + 'FormContainer').classList.add('active');
        }

        // Particles animation
        function createParticles() {
            const particles = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particles.appendChild(particle);
            }
        }

        // Quick demo login
        function quickLogin(email, pass, role) {
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = pass;
            document.querySelector(`input[name="loginRole"][value="${role}"]`).checked = true;
            login(email, pass, role);
        }

        // Form handlers
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const role = document.querySelector('input[name="loginRole"]:checked')?.value;
            if (role) {
                // Simple validation
                if (password.length < 3) {
                    document.getElementById('loginForm').classList.add('shake');
                    setTimeout(() => document.getElementById('loginForm').classList.remove('shake'), 500);
                    return;
                }
                login(email, password, role);
            }
        });

        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Welcome aboard! Account created (demo mode). Redirecting to login...');
            switchTab('login');
        });

        // Init
        document.addEventListener('DOMContentLoaded', createParticles);

        // Role radio styling
        document.querySelectorAll('input[name="loginRole"]').forEach(radio => {
            radio.addEventListener('change', function() {
                // Reset all labels
                document.querySelectorAll('input[name="loginRole"]').forEach(r => {
                    if (r !== this) r.parentElement.style.background = 'var(--light-bg)';
                });
                this.parentElement.style.background = 'white';
                this.parentElement.style.color = this.value === 'volunteer' ? 'var(--success-green)' : 'var(--primary-blue)';
                this.parentElement.style.boxShadow = 'var(--shadow)';
            });
        });
    </script>
</body>
</html>
