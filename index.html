<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueSafe Marine - Smart Water Protection System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ocean-bg">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
    </div>

    <header class="navbar ocean-nav">
        <div class="nav-brand">
            <i class="fas fa-water-wave"></i>
            <span>BlueSafe Marine</span>
        </div>
        <div class="nav-links">
            <a href="login.html" class="btn btn-secondary">Login</a>
        </div>
    </header>

    <main class="hero-container">
        <div class="hero-content">
            <div class="hero-badge">
                <i class="fas fa-award"></i>
                <span>AI-Powered Water Protection</span>
            </div>
            
            <h1 class="hero-title">
                Protecting Our Waters with<br>
                <span class="highlight">Smart Technology</span>
            </h1>
            
            <p class="hero-subtitle">
                Advanced AI, Drone Surveillance, IoT Sensors & Real-time Data<br>
                for Marine Pollution Detection & Management
            </p> 

            <div class="hero-buttons">
                <a href="login.html?role=volunteer" class="btn btn-primary btn-large hero-btn">
                    <i class="fas fa-users"></i> Join as Volunteer
                </a>
                <a href="login.html?role=authority" class="btn btn-success btn-large hero-btn">
                    <i class="fas fa-shield-alt"></i> Authority Access
                </a>
                <a href="dashboard.html" class="btn btn-secondary btn-large hero-btn">
                    <i class="fas fa-chart-line"></i> Live Demo
                </a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
